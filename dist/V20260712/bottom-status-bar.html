      function dungeonGetRecentChatText(limit) {
        const n = Number(limit);
        if (!n || n <= 0) return '';
        try {
          const targetWindow = getParent();
          let chat = null;
          if (targetWindow.SillyTavern && typeof targetWindow.SillyTavern.getContext === 'function') {
            const ctx = targetWindow.SillyTavern.getContext();
            if (ctx && Array.isArray(ctx.chat)) chat = ctx.chat;
          }
          if (!chat && Array.isArray(targetWindow.chat)) chat = targetWindow.chat;
          if (!chat) return '';
          return chat.slice(-n).map(m => {
            const role = m.is_user ? 'Người dùng' : (m.name || 'Nhân vật');
            return `**${role}**: ${(m.mes || '').slice(0, 500)}`;
          }).join('\n\n');
        } catch (err) { return ''; }
      }

      function dungeonGetContext(params) {
        const data = fetchLatestMvuData() || {};
        const \u4E16\u754C\u4FE1\u606F = data.\u4E16\u754C\u4FE1\u606F || {};
        const \u4F4D\u7F6E = \u4E16\u754C\u4FE1\u606F.\u4F4D\u7F6E || {};
        const \u4EBA\u7269 = data.\u4EBA\u7269 || {};
        const \u573A\u6240 = \u4F4D\u7F6E.\u573A\u6240 || '';
        const \u533A\u57DF = \u4F4D\u7F6E.\u533A\u57DF || '';
        const \u5927\u9646 = \u4F4D\u7F6E.\u5927\u9646 || '';
        let \u573A\u6240\u8BE6\u60C5 = data.\u5F53\u524D\u573A\u6240\u8BE6\u60C5 || '';
        if (\u573A\u6240\u8BE6\u60C5 && typeof \u573A\u6240\u8BE6\u60C5 !== 'string') {
          try { \u573A\u6240\u8BE6\u60C5 = JSON.stringify(\u573A\u6240\u8BE6\u60C5); } catch (e) { \u573A\u6240\u8BE6\u60C5 = ''; }
        }
        return {
          \u573A\u6240, \u533A\u57DF, \u5927\u9646,
          \u4F4D\u7F6E\u5B8C\u6574: [\u5927\u9646, \u533A\u57DF, \u573A\u6240].filter(Boolean).join(' > '),
          level: \u4EBA\u7269.\u7B49\u7EA7 || 1,
          \u540D\u79F0: \u4EBA\u7269.\u540D\u79F0 || 'Nhà mạo hiểm',
          \u804C\u4E1A: \u4EBA\u7269.\u804C\u4E1A || '',
          \u4E16\u754C\u89C2: (data.\u7CFB\u7EDF\u914D\u7F6E || {}).\u4E16\u754C\u89C2 || '',
          \u573A\u6240\u8BE6\u60C5,
          history: dungeonGetRecentChatText(params && params.history != null ? params.history : 8)
        };
      }

      async function dungeonLLM(params) {
        const targetWindow = getParent();
        const systemPrompt = (params && params.systemPrompt) || '';
        const userPrompt = (params && params.userPrompt) || '';
        const mode = (params && params.mode) || 'world';
        const full = `${systemPrompt}\n\n${userPrompt}`.trim();
        const TH = targetWindow.TavernHelper;
        const forumApiSettings = {
          enabled: localStorage.getItem('forum_api_enabled_v2') === 'true',
          apiUrl: localStorage.getItem('forum_api_url_v2') || '',
          apiKey: localStorage.getItem('forum_api_key_v2') || '',
          model: localStorage.getItem('forum_api_model_v2') || ''
        };
        const hasStoredForumApi = !!(
          forumApiSettings.enabled
          && forumApiSettings.apiUrl
          && forumApiSettings.apiKey
          && forumApiSettings.model
        );

        async function callStoredForumApi(messages, usePreset = true, chatHistory = '') {
          if (!hasStoredForumApi) return null;

          const finalMessages = [];
          let worldInfoBefore = [];
          let worldInfoAfter = [];

          if (usePreset && TH) {
            try {
              const charWorldbooks = typeof TH.getCharWorldbookNames === 'function'
                ? TH.getCharWorldbookNames('current')
                : { primary: null, additional: [] };
              const worldbookNames = [
                ...(charWorldbooks.primary ? [charWorldbooks.primary] : []),
                ...(Array.isArray(charWorldbooks.additional) ? charWorldbooks.additional : [])
              ];

              for (const wbName of worldbookNames) {
                if (typeof TH.getWorldbook !== 'function') continue;
                try {
                  const entries = await TH.getWorldbook(wbName);
                  (Array.isArray(entries) ? entries : [])
                    .filter(entry => entry && entry.enabled && entry.content)
                    .forEach(entry => {
                      let shouldActivate = false;
                      if (entry.strategy?.type === 'constant') {
                        shouldActivate = true;
                      } else if (entry.strategy?.type === 'selective' && chatHistory) {
                        const primaryKeys = Array.isArray(entry.strategy.keys) ? entry.strategy.keys : [];
                        const matchesPrimary = primaryKeys.some(key => {
                          if (key instanceof RegExp) return key.test(chatHistory);
                          return chatHistory.includes(String(key || ''));
                        });
                        if (matchesPrimary) {
                          const secondary = entry.strategy.keys_secondary;
                          if (!secondary || !Array.isArray(secondary.keys) || secondary.keys.length === 0) {
                            shouldActivate = true;
                          } else {
                            const secondaryMatches = secondary.keys.map(key => {
                              if (key instanceof RegExp) return key.test(chatHistory);
                              return chatHistory.includes(String(key || ''));
                            });
                            switch (secondary.logic) {
                              case 'and_any':
                                shouldActivate = secondaryMatches.some(Boolean);
                                break;
                              case 'and_all':
                                shouldActivate = secondaryMatches.every(Boolean);
                                break;
                              case 'not_all':
                                shouldActivate = !secondaryMatches.every(Boolean);
                                break;
                              case 'not_any':
                                shouldActivate = !secondaryMatches.some(Boolean);
                                break;
                              default:
                                shouldActivate = true;
                            }
                          }
                        }
                      }

                      if (!shouldActivate) return;
                      const msg = {
                        role: entry.position?.role || 'system',
                        content: entry.content
                      };
                      if (
                        entry.position?.type === 'before_character_definition'
                        || entry.position?.type === 'before_example_messages'
                      ) {
                        worldInfoBefore.push(msg);
                      } else {
                        worldInfoAfter.push(msg);
                      }
                    });
                } catch (e) {
                  console.warn('[status-bar][bản đồ phụ bản] Đọc worldbook thất bại:', wbName, e);
                }
              }
            } catch (e) {
              console.warn('[status-bar][bản đồ phụ bản] Lấy danh sách worldbook thất bại:', e);
            }
          }

          if (usePreset && TH && typeof TH.getPreset === 'function') {
            try {
              const preset = TH.getPreset('in_use');
              if (preset && Array.isArray(preset.prompts)) {
                preset.prompts
                  .filter(prompt => prompt && prompt.enabled)
                  .forEach(prompt => {
                    if (prompt.id === 'worldInfoBefore') {
                      finalMessages.push(...worldInfoBefore);
                    } else if (prompt.id === 'worldInfoAfter') {
                      finalMessages.push(...worldInfoAfter);
                    } else if (prompt.content) {
                      finalMessages.push({
                        role: prompt.role || 'user',
                        content: prompt.content
                      });
                    }
                  });
              }
            } catch (e) {
              console.warn('[status-bar][bản đồ phụ bản] Lấy preset SillyTavern thất bại:', e);
            }
          }

          messages.forEach(msg => {
            finalMessages.push({
              role: msg.role || 'user',
              content: msg.content
            });
          });

          let requestUrl = String(forumApiSettings.apiUrl || '').trim();
          if (!requestUrl.endsWith('/')) requestUrl += '/';
          if (!requestUrl.endsWith('/v1/')) requestUrl += 'v1/';
          requestUrl += 'chat/completions';

          let temperature = 0.8;
          let maxTokens = 5000;
          if (usePreset && TH && typeof TH.getPreset === 'function') {
            try {
              const preset = TH.getPreset('in_use');
              if (preset && preset.settings) {
                temperature = preset.settings.temperature || 0.8;
                maxTokens = preset.settings.max_completion_tokens || 5000;
              }
            } catch (_e) { }
          }

          const response = await fetch(requestUrl, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': `Bearer ${forumApiSettings.apiKey}`
            },
            body: JSON.stringify({
              model: forumApiSettings.model,
              messages: finalMessages,
              temperature,
              max_tokens: maxTokens
            })
          });

          if (!response.ok) {
            const errorText = await response.text();
            throw new Error(`Gọi API diễn đàn bất đồng bộ thất bại: HTTP ${response.status} - ${errorText}`);
          }

          const data = await response.json();
          const result = data?.choices?.[0]?.message?.content;
          if (!result) {
            throw new Error('Định dạng phản hồi API diễn đàn bất đồng bộ sai: không tìm thấy nội dung sinh ra');
          }
          return result;
        }

        async function callForumApiForMode() {
          if (!hasStoredForumApi) return null;
          if (mode === 'clean') {
            return await callStoredForumApi([{ role: 'user', content: full }], false, '');
          }
          return await callStoredForumApi([{ role: 'user', content: full }], true, '');
        }

        // \u7834\u9650\u6A21\u5F0F：generate —— \u989D\u5916\u62FC\u63A5\u9152\u9986\u9884\u8BBE+\u4E16\u754C\u4E66+\u7CFB\u7EDF\u4E0A\u4E0B\u6587（\u53EF\u7834\u9650，\u4F46\u6613\u63BA\u6742\u6563\u6587\u5BFC\u81F4 JSON \u89E3\u6790\u5931\u8D25）
        if (mode === 'preset') {
          if (hasStoredForumApi) {
            return await callForumApiForMode();
          }
          if (TH && typeof TH.generate === 'function') {
            return await TH.generate({ user_input: full, should_stream: false, max_chat_history: 0 });
          }
          throw new Error('Không có giao diện AI khả dụng (chế độ phá giới hạn cần TavernHelper.generate).');
        }

        // \u7EAF\u63D0\u793A\u8BCD\u6A21\u5F0F：generateRaw —— \u5565\u90FD\u4E0D\u5E26，JSON \u6700\u7A33\u4F46\u7F3A\u8BBE\u5B9A
        if (mode === 'clean') {
          if (hasStoredForumApi) {
            return await callForumApiForMode();
          }
          if (TH && typeof TH.generateRaw === 'function') {
            return await TH.generateRaw({
              user_input: full,
              should_stream: false,
              ordered_prompts: ['user_input'],
              max_chat_history: 0,
              overrides: {
                world_info_before: '', persona_description: '', char_description: '',
                char_personality: '', scenario: '', world_info_after: '',
                dialogue_examples: '', chat_history: { with_depth_entries: false, author_note: '', prompts: [] }
              }
            });
          }
          throw new Error('Không có giao diện AI khả dụng. Hãy kiểm tra thiết lập sinh toàn cục của SillyTavern trước.');
        }

        // \u9ED8\u8BA4 world \u6A21\u5F0F：generateRaw —— \u5E26\u4E16\u754C\u4E66（world_info_before/after）\u4F46\u4E0D\u5E26\u9884\u8BBE/\u4EBA\u8BBE/\u5BF9\u8BDD\u793A\u4F8B
        // \u4E16\u754C\u4E66\u6309\u53D1\u9001\u5185\u5BB9\u91CC\u7684\u5173\u952E\u8BCD\u89E6\u53D1，user_input \u5DF2\u542B\u5730\u70B9/\u7B49\u7EA7/\u8FD1\u671F\u5267\u60C5，\u8DB3\u4EE5\u6FC0\u6D3B\u5730\u7406\u4E0E\u52BF\u529B\u8BCD\u6761
        if (hasStoredForumApi) {
          return await callForumApiForMode();
        }
        if (TH && typeof TH.generateRaw === 'function') {
          return await TH.generateRaw({
            user_input: full,
            should_stream: false,
            ordered_prompts: ['world_info_before', 'user_input', 'world_info_after'],
            max_chat_history: 0,
            overrides: {
              persona_description: '', char_description: '', char_personality: '',
              scenario: '', dialogue_examples: '',
              chat_history: { with_depth_entries: false, author_note: '', prompts: [] }
            }
          });
        }
        // \u9000\u8DEF：generate（\u5E26\u9884\u8BBE+\u4E16\u754C\u4E66）\u6216\u624B\u673A API（\u5E26\u9884\u8BBE+\u4E16\u754C\u4E66），\u81F3\u5C11\u4FDD\u8BC1\u4E16\u754C\u4E66\u5728\u573A
        if (TH && typeof TH.generate === 'function') {
          return await TH.generate({ user_input: full, should_stream: false, max_chat_history: 0 });
        }
        if (hasStoredForumApi) {
          return await callForumApiForMode();
        }
        throw new Error('Không có giao diện AI khả dụng. Hãy kiểm tra thiết lập sinh toàn cục của SillyTavern trước.');
      }

      function dungeonSetVar(params) {
        const key = params && params.key;
        if (!key) throw new Error('Thiếu tên biến');
        const path = '/' + String(key).split('.').filter(Boolean).join('/');
        const ok = applyMvuPatches([{ op: 'replace', path, value: params.value }]);
        if (!ok) throw new Error('Ghi biến thất bại (MVU chưa sẵn sàng)');
        return true;
      }

      // \u628A「\u63A2\u7D22xxx」\u5199\u5165\u9152\u9986\u804A\u5929\u6846（\u4E0D\u81EA\u52A8\u53D1\u9001），\u4E0E\u884C\u52A8\u9009\u9879\u4E00\u81F4——
      // \u4EC5\u586B\u5165\u8F93\u5165\u6846\u5E76\u89E6\u53D1 input/change \u4E8B\u4EF6，\u7531\u73A9\u5BB6\u81EA\u884C\u70B9\u51FB\u53D1\u9001。
      function dungeonSendMessage(params) {
        const text = String((params && params.text) || '').trim();
        if (!text) throw new Error('Nội dung tin nhắn trống');
        try {
          const win = getParent();
          const doc = (win && win.document) ? win.document : document;
          const textarea = doc.getElementById('send_textarea');
          if (!textarea) throw new Error('Không tìm thấy ô nhập chat');
          const current = String(textarea.value || '').trim();
          // \u5DF2\u5B58\u5728\u76F8\u540C\u5185\u5BB9\u5219\u4E0D\u91CD\u590D\u8FFD\u52A0
          if (current !== text && current.indexOf(text) === -1) {
            textarea.value = current ? (current + '\n' + text) : text;
            textarea.dispatchEvent(new Event('input', { bubbles: true }));
            textarea.dispatchEvent(new Event('change', { bubbles: true }));
          }
          try { textarea.focus(); } catch (_e) {}
          return true;
        } catch (err) {
          throw new Error('Ghi vào ô chat thất bại: ' + ((err && err.message) || err));
        }
      }

      // \u628A\u526F\u672C\u5199\u5165\u4E16\u754C\u4E66\u7684「\u526F\u672C\u5730\u56FE」\u6761\u76EE（\u590D\u7528\u89D2\u8272\u8BE6\u60C5\u90A3\u5957\u4E16\u754C\u4E66\u5199\u5165\u63A5\u53E3）
      async function dungeonSaveWorldbook(params) {
        const entryName = (params && params.entryName) || 'Bản đồ phụ bản';
        const content = String((params && params.content) || '').trim();
        const keywords = (params && Array.isArray(params.keywords)) ? params.keywords : [];
        if (!content) throw new Error('Nội dung phụ bản trống');
        const driver = createCharacterProfileWorldbookDriver();
        if (!driver) throw new Error('Môi trường hiện tại chưa cung cấp giao diện ghi worldbook');
        const worldbookName = await resolveCharacterProfileWorldbook(driver);
        if (!worldbookName) throw new Error('Hiện không có worldbook mục tiêu có thể ghi');

        const entries = await driver.getEntries(worldbookName);
        const list = Array.isArray(entries) ? entries : [];
        const existing = list.find((e) =>
          String(e?.name || '').trim() === entryName || e?.extra?.dungeonMapEntry === entryName
        );

        const payload = {
          name: entryName,
          enabled: true,
          strategy: {
            type: keywords.length > 0 ? 'selective' : 'constant',
            keys: keywords,
            keys_secondary: { logic: 'and_any', keys: [] },
            scan_depth: 'same_as_global'
          },
          position: { type: 'before_character_definition', role: 'system', depth: 0, order: 400 },
          content,
          probability: 100,
          recursion: { prevent_incoming: true, prevent_outgoing: true, delay_until: null },
          effect: { sticky: null, cooldown: null, delay: null },
          extra: { dungeonMapGenerator: true, dungeonMapEntry: entryName, installedAt: new Date().toISOString() }
        };

        if (existing) {
          await driver.updateEntry(worldbookName, existing.uid, {
            ...existing, ...payload,
            extra: { ...(existing.extra || {}), ...payload.extra }
          });
        } else {
          await driver.createEntries(worldbookName, [payload]);
        }
        return { worldbookName, updated: !!existing };
      }

      // \u5220\u9664\u4E16\u754C\u4E66\u91CC\u7531\u672C\u751F\u6210\u5668\u5199\u5165\u7684\u526F\u672C\u5730\u56FE\u6761\u76EE（\u6309\u6761\u76EE\u540D\u6216\u751F\u6210\u5668\u6807\u8BB0\u5339\u914D）
      async function dungeonDeleteWorldbook(params) {
        const names = (params && Array.isArray(params.entryNames) && params.entryNames.length)
          ? params.entryNames
          : ['Bản đồ phụ bản', 'Bản đồ phụ bản · GM bí mật', '\u526f\u672c\u5730\u56fe', '\u526f\u672c\u5730\u56fe\u00b7GM\u673a\u5bc6'];
        const nameSet = new Set(names.map((n) => String(n || '').trim()).filter(Boolean));
        const driver = createCharacterProfileWorldbookDriver();
        if (!driver) throw new Error('Môi trường hiện tại chưa cung cấp giao diện ghi worldbook');
        const worldbookName = await resolveCharacterProfileWorldbook(driver);
        if (!worldbookName) throw new Error('Hiện không có worldbook mục tiêu có thể thao tác');

        const entries = await driver.getEntries(worldbookName);
        const list = Array.isArray(entries) ? entries : [];
        const matches = (e) => {
          const nm = String(e?.name || '').trim();
          return nameSet.has(nm)
            || nameSet.has(String(e?.extra?.dungeonMapEntry || '').trim())
            || (e?.extra?.dungeonMapGenerator === true && (nameSet.has(nm) || !nm));
        };
        const removed = list.filter(matches).length;
        if (removed > 0) {
          await driver.deleteEntries(worldbookName, matches);
        }
        return { worldbookName, removed };
      }

      window.addEventListener('message', async (e) => {
        const msg = e.data;
        if (!msg || msg.source !== 'dungeon_map' || msg.type !== 'rpc_request') return;
        const reply = (payload) => {
          try { e.source.postMessage(Object.assign({ type: 'rpc_response', id: msg.id }, payload), '*'); } catch (err) { }
        };
        try {
          let result;
          if (msg.action === 'get_context') result = dungeonGetContext(msg.params || {});
          else if (msg.action === 'llm') result = await dungeonLLM(msg.params || {});
          else if (msg.action === 'set_var') result = dungeonSetVar(msg.params || {});
          else if (msg.action === 'save_worldbook') result = await dungeonSaveWorldbook(msg.params || {});
          else if (msg.action === 'delete_worldbook') result = await dungeonDeleteWorldbook(msg.params || {});
          else if (msg.action === 'send_message') result = dungeonSendMessage(msg.params || {});
          else throw new Error('RPC action chưa biết: ' + msg.action);
          reply({ result });
        } catch (err) {
          reply({ error: (err && err.message) || String(err) });
        }
      });
    })();
  </script>
</body>
