        const fn = win.rpg_status_bar_showPopup;
        const data = fetchLatestMvuData();
        const skillTree = data?.\u4EBA\u7269?.\u6280\u80FD\u6811 || {};
        const \u6280\u80FD\u5217\u8868 = skillTree.\u6280\u80FD\u5217\u8868 || {};
        const allSlots = { ...data?.\u4EBA\u7269?.\u4E3B\u52A8\u6280\u80FD\u69FD, ...data?.\u4EBA\u7269?.\u89C9\u9192\u6280\u80FD\u69FD };
        const slotData = allSlots[skillName] || {};
        const skillData = { ...\u6280\u80FD\u5217\u8868[skillName], ...slotData };
        const slotMeta = parseSlotMeta(slotMetaRaw);
        const canManageComboSlot = !!(slotMeta && slotMeta.comboSlot);
        const canManageSlot = !!slotType;
        if (fn && !canManageSlot && !canManageComboSlot) { fn('skill', skillName, skillData); return; }
        // Popup cục bộ
        removePopup();
        const tier = skillData.\u9636\u4F4D || '\u57fa\u7840';
        const typeStr = skillData.\u7C7B\u578B || '\u6280\u80fd';
        const tierLabel = displaySkillTier(tier);
        const typeLabel = displaySkillType(typeStr);
        const tierConfig = TIER_CONFIG[tier] || {};
        const level = skillData.\u5F53\u524D\u7B49\u7EA7 || skillData.\u6280\u80FD\u7B49\u7EA7 || 0;
        const maxLevel = tierConfig.\u7B49\u7EA7\u4E0A\u9650 || skillData.\u7B49\u7EA7\u4E0A\u9650 || 1;
        const cd = tierConfig.\u51B7\u5374 || skillData.\u51B7\u5374 || 0;
        const spCost = tierConfig.SP\u6D88\u8017 || 0;
        const requiredLevel = tierConfig.\u4E60\u5F97\u7B49\u7EA7 || 1;
        const desc = skillData.\u63CF\u8FF0 || '';
        // Đọc bội suất sát thương đã lưu (từ ô kỹ năng), nếu không có thì dùng giá trị cơ bản để xem trước (không dao động)
        let dmg = skillData.\u4F24\u5BB3\u500D\u7387;
        if (!dmg && level > 0) {
          const _tc = TIER_CONFIG[tier];
          if (_tc && skillData.\u7C7B\u578B !== '\u7279\u6b8a' && skillData.\u7C7B\u578B !== '\u804c\u4e1a\u7279\u6b8a') {
            const raw = getSkillBaseDamage({ ...skillData, \u5F53\u524D\u7B49\u7EA7: level }, data);
            dmg = Math.round(raw / 10) * 10;
          }
        }
        dmg = dmg || 0;
        const special = getSpecialEffect(skillData);
        const tierColor = tierColors[tier] || '#95a5a6';
        const charLevel = data?.\u4EBA\u7269?.\u7B49\u7EA7 || 1;
        const isUnlocked = charLevel >= requiredLevel;

        // Kiểm tra có kỹ năng khác có thể trang bị không
        const isAwk = slotType === '\u89c9\u9192\u6280\u80fd\u69fd';
        const awkTiers = new Set(['\u89c9\u9192\u4e00', '\u89c9\u9192\u4e8c', '\u89c9\u9192\u4e09']);
        const currentSlot = canManageSlot ? (data?.\u4EBA\u7269?.[slotType] || {}) : {};
        const equippedNames = new Set(Object.keys(currentSlot));
        const comboState = canManageComboSlot ? getComboEquipState(data) : null;
        const comboEquippedNames = canManageComboSlot
          ? new Set(getComboActiveSkillNames(comboState, slotMeta.groupKey).filter(name => name !== skillName))
          : null;
        const availableOthers = canManageComboSlot
          ? Object.entries(\u6280\u80FD\u5217\u8868).filter(([name, skill]) => {
            if (name === skillName) return false;
            if (comboEquippedNames.has(name)) return false;
            if ((skill?.\u5F53\u524D\u7B49\u7EA7 || 0) === 0) return false;
            return (slotMeta.allowedTiers || []).includes(skill.\u9636\u4F4D || '');
          })
          : canManageSlot
          ? Object.entries(\u6280\u80FD\u5217\u8868).filter(([n, s]) => {
            if (n === skillName) return false;
            if (equippedNames.has(n)) return false;
            const t = s.\u9636\u4F4D || '\u57fa\u7840';
            if (isAwk ? !awkTiers.has(t) : awkTiers.has(t)) return false;
            // Chỉ hiện kỹ năng đã mở khóa ở cấp hiện tại và đã học
            const tierCfg = TIER_CONFIG[t];
            if (tierCfg && charLevel < tierCfg.\u4E60\u5F97\u7B49\u7EA7) return false;
            if ((s.\u5F53\u524D\u7B49\u7EA7 || 0) === 0) return false;
            return true;
          })
          : [];


        const html = `<div id="bottom-popup" class="fusion-popup-overlay">
          <div class="fusion-card" style="--quality-color: ${tierColor}">
            <button class="popup-close"><i class="ri-close-line"></i></button>
            <div class="f-header">
              <div class="f-meta-row">
                <span class="f-quality">${tierLabel}</span>
                <span class="f-type">// ${typeLabel}</span>
              </div>
              <div class="f-title-row"><span class="f-name">${skillName}</span></div>
            </div>
            <div class="f-stat-bar">
              <div class="f-mini-stat"><span class="f-ms-label">Cấp</span><span class="f-ms-val">${level} <span style="font-size:0.8em;opacity:0.6">/ ${maxLevel}</span></span></div>
              <div class="f-mini-stat"><span class="f-ms-label">Cấp bậc</span><span class="f-ms-val" style="color:${tierColor}">${tierLabel}</span></div>
              <div class="f-mini-stat"><span class="f-ms-label">Mở khóa</span><span class="f-ms-val" style="color:${isUnlocked ? '#27ae60' : '#e74c3c'}">${isUnlocked ? '✓' : 'Lv.' + requiredLevel}</span></div>
            </div>
            <div class="f-content">
              <div class="f-data-group">
                ${spCost > 0 ? `<div class="f-data-row"><span class="f-data-label"><i class="ri-star-line"></i> Tiêu hao SP/cấp</span><span class="f-data-val">${spCost}</span></div>` : ''}
                ${cd > 0 ? `<div class="f-data-row"><span class="f-data-label"><i class="ri-timer-line"></i> Hồi chiêu</span><span class="f-data-val">${cd} hiệp</span></div>` : ''}
                ${dmg > 0 ? `<div class="f-data-row"><span class="f-data-label"><i class="ri-sword-line"></i> Bội suất sát thương</span><span class="f-data-val val-positive">${dmg}%</span></div>` : ''}
              </div>
              <div class="f-section-title"><i class="ri-file-text-line"></i>Mô tả</div>
              <div class="f-effect-box">${desc || 'Không'}</div>
              ${special ? `<div class="f-section-title"><i class="ri-magic-line"></i>Hiệu ứng hiện tại (Lv.${level})</div><div class="f-effect-box">${special}</div>` : ''}
            </div>
            ${(canManageSlot || canManageComboSlot) ? `<div style="display:flex;gap:8px;padding:12px 16px;border-top:1px solid #f0f0f0;">
              <button class="skill-action-btn skill-unequip" style="flex:1;padding:8px;border:1px solid #e0e0e0;border-radius:8px;background:#fff;cursor:pointer;font-size:0.75rem;color:#e74c3c;font-weight:600;">
                <i class="ri-delete-back-2-line"></i> Tháo ra
              </button>
              ${(canManageSlot || canManageComboSlot) && availableOthers.length > 0 ? `<button class="skill-action-btn skill-change" style="flex:1;padding:8px;border:1px solid #dfe6e9;border-radius:8px;background:#f8f9fa;cursor:pointer;font-size:0.75rem;color:var(--text-main);font-weight:600;">
                <i class="ri-refresh-line"></i> Thay đổi
              </button>` : ''}
            </div>` : ''}
          </div>
        </div>`;
        app.insertAdjacentHTML('afterend', html);
        // Tháo
        if (canManageSlot || canManageComboSlot) {
          document.querySelector('.skill-unequip')?.addEventListener('click', () => {
            // Cấm đổi kỹ năng khi đang chiến đấu
            if (isInBattle()) { showBattleWarning('Không thể thay kỹ năng trong chiến đấu'); return; }
            if (canManageComboSlot) {
              const ok = setComboSlotAssignment(slotMeta, '');
              if (!ok) return;
              removePopup();
              setTimeout(refresh, 100);
              return;
            }
            applyMvuPatches([
              { op: 'remove', path: `/\u4eba\u7269/${slotType}/${skillName}` },
              // Cập nhật đồng bộ trạng thái đang trang bị trong danh sách kỹ năng
              { op: 'replace', path: `/\u4eba\u7269/\u6280\u80fd\u6811/\u6280\u80fd\u5217\u8868/${skillName}/\u662f\u5426\u88c5\u5907`, value: false }
            ]);
            removePopup();
            setTimeout(refresh, 100);
          });
        }
        if (canManageSlot || canManageComboSlot) {
          document.querySelector('.skill-change')?.addEventListener('click', () => {
            // Cấm đổi kỹ năng khi đang chiến đấu
            if (isInBattle()) { showBattleWarning('Không thể thay kỹ năng trong chiến đấu'); return; }
            removePopup();
            openSkillPicker(slotType, skillName, slotMetaRaw);
          });
        }
        bindPopupClose();
      };


      const clearEquippedSkillSlot = (slotType, replaceSkillName, slotMetaRaw) => {
        if (!replaceSkillName) return false;
        if (isInBattle()) { showBattleWarning('Không thể thay kỹ năng trong chiến đấu'); return false; }
        const slotMeta = parseSlotMeta(slotMetaRaw);
        if (slotMeta && slotMeta.comboSlot) {
          const ok = setComboSlotAssignment(slotMeta, '');
          if (ok) setTimeout(refresh, 100);
          return ok;
        }
        if (!slotType) return false;
        applyMvuPatches([
          { op: 'remove', path: `/\u4eba\u7269/${slotType}/${replaceSkillName}` },
          { op: 'replace', path: `/\u4eba\u7269/\u6280\u80fd\u6811/\u6280\u80fd\u5217\u8868/${replaceSkillName}/\u662f\u5426\u88c5\u5907`, value: false }
        ]);
        setTimeout(refresh, 100);
        return true;
      };

      // Bộ chọn kỹ năng
      const openSkillPicker = (slotType, replaceSkillName, slotMetaRaw) => {
        document.getElementById('combo-picker-overlay')?.remove();
        const d = fetchLatestMvuData();
        const skillTree = d?.\u4EBA\u7269?.\u6280\u80FD\u6811 || {};
        const \u6280\u80FD\u5217\u8868 = skillTree.\u6280\u80FD\u5217\u8868 || {};
        const slotMeta = parseSlotMeta(slotMetaRaw);
        const equippedAll = new Set([
          ...Object.keys(d?.\u4EBA\u7269?.\u4E3B\u52A8\u6280\u80FD\u69FD || {}),
          ...Object.keys(d?.\u4EBA\u7269?.\u89C9\u9192\u6280\u80FD\u69FD || {})
        ]);
        const isAwk = slotType === '\u89c9\u9192\u6280\u80fd\u69fd';
        const awkTiers = new Set(['\u89c9\u9192\u4e00', '\u89c9\u9192\u4e8c', '\u89c9\u9192\u4e09']);

        const charLevel = d?.\u4EBA\u7269?.\u7B49\u7EA7 || 1;
        let available = [];
        if (slotMeta && slotMeta.comboSlot) {
          const comboState = getComboEquipState(d);
          const activeNames = new Set(getComboActiveSkillNames(comboState, slotMeta.groupKey));
          if (replaceSkillName) activeNames.delete(replaceSkillName);
          available = Object.entries(\u6280\u80FD\u5217\u8868).filter(([name, skill]) => {
            if (name === replaceSkillName) return false;
            if (activeNames.has(name)) return false;
            if ((skill?.\u5F53\u524D\u7B49\u7EA7 || 0) === 0) return false;
            const tierCfg = TIER_CONFIG[skill.\u9636\u4F4D || ''];
            if (tierCfg && charLevel < tierCfg.\u4E60\u5F97\u7B49\u7EA7) return false;
            return (slotMeta.allowedTiers || []).includes(skill.\u9636\u4F4D || '');
          });
        } else {
          available = Object.entries(\u6280\u80FD\u5217\u8868).filter(([name, skill]) => {
            if (equippedAll.has(name)) return false;
            const t = skill.\u9636\u4F4D || '\u57fa\u7840';
            if (isAwk ? !awkTiers.has(t) : awkTiers.has(t)) return false;
            // Chỉ hiện kỹ năng đã mở khóa ở cấp hiện tại
            const tierCfg = TIER_CONFIG[t];
            if (tierCfg && charLevel < tierCfg.\u4E60\u5F97\u7B49\u7EA7) return false;
            // Chỉ hiện kỹ năng đã học (cấp > 0)
            if ((skill.\u5F53\u524D\u7B49\u7EA7 || 0) === 0) return false;
            return true;
          });
        }

        const canClearCurrent = !!replaceSkillName && (!!slotType || (slotMeta && slotMeta.comboSlot));
        if (available.length === 0 && !canClearCurrent) {
          showBattleWarning((slotMeta && slotMeta.comboSlot) ? `${slotMeta.title} không có kỹ năng có thể trang bị` : 'Hiện không có kỹ năng có thể trang bị');
          return;
        }

        const pickerSlotMetaAttr = slotMeta ? (" data-slot-meta='" + encodeSlotMeta(slotMeta) + "'") : '';
        let listHtml = '';
        if (canClearCurrent) {
          const clearSlotLabel = (slotMeta && slotMeta.comboSlot)
            ? (slotMeta.title || 'slot hiện tại')
            : (isAwk ? 'slot thức tỉnh hiện tại' : 'slot kỹ năng hiện tại');
          listHtml += `<div class="combo-picker-item current" data-clear-skill-slot="1" data-slot-type="${slotType || ''}" data-replace-skill="${replaceSkillName}"${pickerSlotMetaAttr}>
            <div class="combo-picker-avatar-placeholder" style="background:#fff5f5;color:#c0392b;">
              <i class="ri-delete-back-2-line"></i>
            </div>
            <div class="combo-picker-info">
              <div class="combo-picker-bond-name">Tháo kỹ năng hiện tại</div>
              <div class="combo-picker-skill-name" style="color:#c0392b">${replaceSkillName} · ${clearSlotLabel}</div>
            </div>
          </div>`;
        }
        available.forEach(([name, skill]) => {
          const tier = skill.\u9636\u4F4D || '\u57fa\u7840';
          const tierColor = tierColors[tier] || '#95a5a6';
          const lv = skill.\u5F53\u524D\u7B49\u7EA7 || 0;
          const typeStr = skill.\u7C7B\u578B || '\u4e3b\u52a8';
          const iconSvg = getSkillSvg(typeStr, tier);
          const tierLabel = displaySkillTier(tier);
          const typeLabel = displaySkillType(typeStr);
          listHtml += `<div class="combo-picker-item" data-equip-skill="${name}" data-slot-type="${slotType}"${pickerSlotMetaAttr}>
            <div style="width:32px;height:32px;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:${tierColor};">${iconSvg}</div>
            <div class="combo-picker-info">
              <div class="combo-picker-bond-name">${name}</div>
              <div class="combo-picker-skill-name" style="color:var(--text-sub)">${typeLabel} · ${tierLabel} · Lv.${lv}</div>
            </div>
          </div>`;
        });

        const allowedTierLabel = (slotMeta && slotMeta.allowedTiers) ? slotMeta.allowedTiers.map(displaySkillTier).join('/') : '';
        const title = (slotMeta && slotMeta.comboSlot)
          ? `Chọn kỹ năng ${allowedTierLabel || ''}`.trim()
          : (isAwk ? 'Chọn kỹ năng thức tỉnh' : 'Chọn kỹ năng');
        const overlayHtml = `<div class="combo-picker-overlay" id="combo-picker-overlay">
          <div class="combo-picker">
            <div class="combo-picker-title" style="color:var(--text-main)"><i class="ri-sword-line"></i> ${title}</div>
            <div class="combo-picker-list">${listHtml}</div>
          </div>
        </div>`;
        document.body.insertAdjacentHTML('beforeend', overlayHtml);
        const overlay = document.getElementById('combo-picker-overlay');
        requestAnimationFrame(() => overlay?.classList.add('show'));
        overlay?.addEventListener('click', (e) => {
          if (e.target === overlay) { overlay.remove(); return; }
          const clearItem = e.target.closest('[data-clear-skill-slot]');
          if (clearItem) {
            const cleared = clearEquippedSkillSlot(clearItem.dataset.slotType, clearItem.dataset.replaceSkill, clearItem.dataset.slotMeta);
            if (cleared) overlay.remove();
            return;
          }
          const item = e.target.closest('[data-equip-skill]');
          if (!item) return;
          const equipped = equipSkillToSlot(item.dataset.equipSkill, item.dataset.slotType, replaceSkillName, item.dataset.slotMeta);
          if (equipped) overlay.remove();
        });
      };

      const equipSkillToSlot = (skillName, slotType, replaceSkillName, slotMetaRaw) => {
        // Cấm đổi kỹ năng khi đang chiến đấu
        if (isInBattle()) { showBattleWarning('Không thể thay kỹ năng trong chiến đấu'); return false; }
        const d = fetchLatestMvuData();
        const skill = d?.\u4EBA\u7269?.\u6280\u80FD\u6811?.\u6280\u80FD\u5217\u8868?.[skillName] || {};
        const slotMeta = parseSlotMeta(slotMetaRaw);
        if (slotMeta && slotMeta.comboSlot) {
          const ok = setComboSlotAssignment(slotMeta, skillName);
          if (!ok) return false;
          setTimeout(refresh, 100);
          return true;
        }
        const slotConfig = getSkillSlotConfig(d);
        const isAwk = slotType === '\u89c9\u9192\u6280\u80fd\u69fd';
        const maxSlots = isAwk ? slotConfig.awakening : slotConfig.main;
        const currentCount = Object.keys(d?.\u4EBA\u7269?.[slotType] || {}).length;
        if (!replaceSkillName && currentCount >= maxSlots) {
          showBattleWarning(`${isAwk ? 'Thức tỉnh' : 'Chủ động'}: slot kỹ năng đã đầy`);
          return false;
        }
        const slotData = {
          \u540D\u79F0: skillName,
          \u7C7B\u578B: skill.\u7C7B\u578B || '\u4e3b\u52a8',
          \u6280\u80FD\u7B49\u7EA7: skill.\u5F53\u524D\u7B49\u7EA7 || 1,
          \u51B7\u5374\u4E2D: false,
          \u4F24\u5BB3\u500D\u7387: calcSkillDamage({ ...skill, \u5F53\u524D\u7B49\u7EA7: skill.\u5F53\u524D\u7B49\u7EA7 || 1 }, d),
          \u9636\u4F4D: skill.\u9636\u4F4D || '\u57fa\u7840',
          \u7279\u6B8A\u6548\u679C: getSpecialEffectObj({ ...skill, \u5F53\u524D\u7B49\u7EA7: skill.\u5F53\u524D\u7B49\u7EA7 || 1 }),
          \u63CF\u8FF0: skill.\u63CF\u8FF0 || ''
        };
        if (skill.\u53EC\u5524\u7269\u540D\u79F0) slotData.\u53EC\u5524\u7269\u540D\u79F0 = skill.\u53EC\u5524\u7269\u540D\u79F0;
        const patches = [];
        if (replaceSkillName) {
          patches.push({ op: 'remove', path: `/\u4eba\u7269/${slotType}/${replaceSkillName}` });
          // Cập nhật đồng bộ trạng thái đang trang bị của kỹ năng bị thay thế
          patches.push({ op: 'replace', path: `/\u4eba\u7269/\u6280\u80fd\u6811/\u6280\u80fd\u5217\u8868/${replaceSkillName}/\u662f\u5426\u88c5\u5907`, value: false });
        }
        patches.push({ op: 'add', path: `/\u4eba\u7269/${slotType}/${skillName}`, value: slotData });
        // Cập nhật đồng bộ trạng thái đang trang bị trong danh sách kỹ năng
        patches.push({ op: 'replace', path: `/\u4eba\u7269/\u6280\u80fd\u6811/\u6280\u80fd\u5217\u8868/${skillName}/\u662f\u5426\u88c5\u5907`, value: true });
        const applied = applyMvuPatches(patches);
        if (!applied) {
          showBattleWarning('Trang bị kỹ năng thất bại: dữ liệu MVU chưa sẵn sàng');
          return false;
        }
        setTimeout(refresh, 100);
        return true;
      };

      const getDataUrlByteSize = (dataUrl) => {
        try {
          const base64 = String(dataUrl || '').split(',')[1] || '';
          return Math.ceil(base64.length * 3 / 4);
        } catch (e) {
          return Number.MAX_SAFE_INTEGER;
        }
      };

      const compressAvatarImage = (file, opts = {}) => new Promise((resolve, reject) => {
        if (!file) return reject(new Error('no_file'));
        const maxSide = opts.maxSide || 512;
        const maxBytes = opts.maxBytes || 240 * 1024;
        const minQuality = opts.minQuality || 0.5;
        let quality = opts.quality || 0.85;

        const reader = new FileReader();
        reader.onerror = () => reject(new Error('read_failed'));
        reader.onload = () => {
          const img = new Image();
          img.onerror = () => reject(new Error('decode_failed'));
          img.onload = () => {
            const longest = Math.max(img.width, img.height) || 1;
            const scale = Math.min(1, maxSide / longest);
            const targetW = Math.max(1, Math.round(img.width * scale));
            const targetH = Math.max(1, Math.round(img.height * scale));
            const canvas = document.createElement('canvas');
            canvas.width = targetW;
            canvas.height = targetH;
            const ctx = canvas.getContext('2d');
            if (!ctx) return reject(new Error('canvas_failed'));
            ctx.drawImage(img, 0, 0, targetW, targetH);

            let out = canvas.toDataURL('image/jpeg', quality);
            while (getDataUrlByteSize(out) > maxBytes && quality > minQuality) {
              quality = Math.max(minQuality, quality - 0.1);
              out = canvas.toDataURL('image/jpeg', quality);
            }
            resolve(out);
          };
          img.src = String(reader.result || '');
        };
        reader.readAsDataURL(file);
      });

      // Gắn lên window để innerHTML onclick gọi được
      window.triggerAvatarUpload = (name) => {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.onchange = async (e) => {
          const file = e.target.files[0];
          if (!file) return;
          try {
            const base64 = await compressAvatarImage(file, { maxSide: 512, maxBytes: 240 * 1024, quality: 0.85, minQuality: 0.5 });
            // Chỉ lưu bền vào localStorage, không ghi vào MVU
            localStorage.setItem('rpg_bond_avatar_' + name, base64);
            _cachedData = null;
            setTimeout(refresh, 100);
        } catch (err) {
          console.warn('Xử lý ảnh đại diện gắn kết thất bại:', err);
          }
        };
        input.click();
      };

      // Lấy avatar gắn kết thống nhất: localStorage > MVU > preset
      const getBondAvatar = (name, bond) => {
        try { const v = localStorage.getItem('rpg_bond_avatar_' + name); if (v) return v; } catch (e) { }
        return bond?.\u5934\u50CF || getPresetAvatar(name) || '';
      };

      // Dọn cache avatar gắn kết không còn tồn tại để tránh rò localStorage
      const cleanBondAvatarCache = (currentBondNames) => {
        try {
          const prefix = 'rpg_bond_avatar_';
          const keysToRemove = [];
          for (let i = 0; i < localStorage.length; i++) {
            const key = localStorage.key(i);
            if (key && key.startsWith(prefix)) {
              const name = key.slice(prefix.length);
              if (!currentBondNames.has(name)) keysToRemove.push(key);
            }
          }
          keysToRemove.forEach(k => localStorage.removeItem(k));
        } catch (e) { }
      };

      // Tải avatar nhân vật chính của người chơi lên
      window.triggerPlayerAvatarUpload = () => {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.onchange = async (e) => {
          const file = e.target.files[0];
          if (!file) return;
          try {
            const base64 = await compressAvatarImage(file, { maxSide: 512, maxBytes: 240 * 1024, quality: 0.85, minQuality: 0.5 });
            localStorage.setItem('rpg_player_avatar', base64);
            _cachedData = null;
            setTimeout(refresh, 100);
          } catch (err) {
            console.warn('Xử lý ảnh đại diện thất bại:', err);
          }
        };
        input.click();
      };

      // Render chi tiết gắn kết vào bảng bên phải
      // Render chi tiết gắn kết vào bảng bên phải (Bento Layout)
      const renderBondDetail = (name, data) => {
        const container = document.getElementById('bond-container');
        const pane = document.getElementById('bond-detail-container');
        if (!pane || !container) return;

        // Mapping màu phẩm chất
        const qualityColorMap = {
          'Thường': '#2D3436',
          'Tinh xảo': '#0047AB',
          'Hiếm': '#9b59b6',
          'Xuất sắc': '#e84393',
          'Truyền thuyết': '#e67e22',
          'Sử thi': '#C9A227',
          'Thần thoại': '#e8198b'
        };
        const getQualityColor = (q) => qualityColorMap[normalizeQualityName(q)] || qualityColorMap['Thường'];
        const qualityBadgeMap = {
          'Thường': { bg: 'rgba(45, 52, 54, 0.08)', color: '#636e72', border: 'rgba(45, 52, 54, 0.12)' },
          'Tinh xảo': { bg: 'rgba(0, 71, 171, 0.08)', color: '#0047AB', border: 'rgba(0, 71, 171, 0.15)' },
          'Hiếm': { bg: 'rgba(155, 89, 182, 0.08)', color: '#9b59b6', border: 'rgba(155, 89, 182, 0.15)' },
          'Xuất sắc': { bg: 'rgba(232, 67, 147, 0.08)', color: '#e84393', border: 'rgba(232, 67, 147, 0.15)' },
          'Truyền thuyết': { bg: 'rgba(230, 126, 34, 0.08)', color: '#e67e22', border: 'rgba(230, 126, 34, 0.15)' },
          'Sử thi': { bg: 'rgba(201, 162, 39, 0.08)', color: '#C9A227', border: 'rgba(201, 162, 39, 0.15)' },
          'Thần thoại': { bg: 'rgba(232, 25, 139, 0.08)', color: '#e8198b', border: 'rgba(232, 25, 139, 0.15)' }
        };
        const getQualityBadgeStyle = (q) => q ? (qualityBadgeMap[normalizeQualityName(q)] || null) : null;

        container.classList.add('mode-detail'); // Chuyển sang chế độ gọn

        const gender = displayRuntimeLabel(data.\u6027\u522B || 'Chưa rõ');
        const race = displayRuntimeLabel(data.\u79CD\u65CF || 'Chưa rõ');
        const level = data.\u7B49\u7EA7 || 1;
        const thought = data.\u5F53\u524D\u60F3\u6CD5 || 'Không có ý nghĩ đặc biệt';
        const stats = data.\u5C5E\u6027 || {};
        const skills = data.\u6280\u80FD || {};
        const equips = data.\u88C5\u5907\u5217\u8868 || {};
        const comboSkills = data.\u8FDE\u643A\u5965\u4E49 || {};
        const avatar = getBondAvatar(name, data);
        const favor = data.\u597D\u611F\u5EA6 || 0;
        const favorMax = 100;
        const favorPct = Math.min(100, Math.max(0, ((favor + favorMax) / (favorMax * 2)) * 100));
        const shareExp = data.\u5206\u4EAB\u7ECF\u9A8C !== false && data.\u5206\u4EAB\u7ECF\u9A8C !== '\u5426';
        const detailVisible = isBondDetailVisible(fetchLatestMvuData(), name);

        const fmtNum = (n) => Number.isFinite(n)
          ? (Math.abs(n - Math.round(n)) < 0.001 ? String(Math.round(n)) : String(Math.round(n * 10) / 10))
          : '0';

        const hpCurrent = Number(data.\u5F53\u524D\u751F\u547D\u503C);
        const hpMax = Number(data.\u751F\u547D\u503C\u4E0A\u9650);
        const hasHpBar = Number.isFinite(hpCurrent) && Number.isFinite(hpMax) && hpMax > 0;
        const safeHpCurrent = hasHpBar ? Math.min(Math.max(hpCurrent, 0), hpMax) : 0;
        const hpPct = hasHpBar ? Math.min(100, Math.max(0, (safeHpCurrent / hpMax) * 100)) : 0;

        const expCurrent = Number(data.\u5F53\u524D\u603B\u7ECF\u9A8C);
        const expNeed = Number(data.\u5347\u7EA7\u9608\u503C);
        const hasExpBar = Number.isFinite(expCurrent) && Number.isFinite(expNeed) && expNeed > 0;
        const safeExpCurrent = hasExpBar ? Math.max(0, expCurrent) : 0;
        const safeLevel = Math.max(1, Math.floor(Number(level) || 1));
        const calcTh = (lv) => { let t = 0; for (let L = 1; L < lv; L++) t += Math.floor(100 * Math.pow(L, 1.5)); return t; };
        const prevExpNeed = calcTh(safeLevel);
        const levelExpNeed = expNeed - prevExpNeed;
        const levelExpCurrent = safeExpCurrent - prevExpNeed;
        const expPct = hasExpBar
          ? ((levelExpNeed > 0 && levelExpCurrent >= 0)
            ? Math.min(100, Math.max(0, (levelExpCurrent / levelExpNeed) * 100))
            : Math.min(100, Math.max(0, (safeExpCurrent / expNeed) * 100)))
          : 0;

        const resourceCardHTML = (hasHpBar || hasExpBar) ? `
                <div class="bd-card bd-resource-card">
                  <div class="bd-card-title"><i class="ri-heart-pulse-line"></i> Trạng thái</div>
                  <div class="bd-resource-grid">
                    ${hasHpBar ? `
                      <div class="bd-resource-row">
                        <div class="bd-resource-top">
                          <span class="bd-resource-name"><i class="ri-heart-3-line"></i>HP</span>
                          <span class="bd-resource-value">${fmtNum(safeHpCurrent)} / ${fmtNum(hpMax)}</span>
                        </div>
                        <div class="bd-resource-track"><div class="bd-resource-fill hp" style="width:${hpPct}%"></div></div>
                      </div>
                    ` : ''}
                    ${hasExpBar ? `
                      <div class="bd-resource-row">
                        <div class="bd-resource-top">
                          <span class="bd-resource-name"><i class="ri-flashlight-line"></i>EXP</span>
                          <span class="bd-resource-value">${fmtNum(safeExpCurrent)} / ${fmtNum(expNeed)}</span>
                        </div>
                        <div class="bd-resource-track"><div class="bd-resource-fill exp" style="width:${expPct}%"></div></div>
                      </div>
                    ` : ''}
                  </div>
                </div>
        ` : '';

        // Bento Grid HTML

        const html = `
          <div class="bd-layout">
            <div class="bd-banner">
              <button class="bd-close-abs" onclick="closeBondDetail()"><i class="ri-close-line"></i></button>
              
              <div class="bd-hero-avatar-container">
                ${avatar ?
            `<img src="${avatar}" class="bd-hero-img">` :
            `<div class="bd-hero-placeholder"><i class="ri-user-smile-line"></i></div>`
          }
                <div class="bd-upload-mask" data-bond-name="${encodeURIComponent(name)}"><i class="ri-camera-line"></i></div>
              </div>
              
              <div class="bd-hero-info">
                <div class="bd-hero-name">
                  ${name}
                </div>
                <div class="bd-hero-badges">
                  <span class="bd-badge race">${race}</span>
                  <span class="bd-badge">${gender}</span>
                  <span class="bd-badge level">Lv.${level}</span>
                  ${data.\u540C\u884C\u8A93\u7EA6 ? '<span class="bd-badge" style="background:rgba(0,0,0,0.06);color:#f39c12;font-weight:600;">Lời thề</span>' : ''}
                </div>

                <div class="bd-hero-actions">
                  <button type="button" class="bd-hero-action-btn generate" data-generate-character-profile="bond" data-character-name="${encodeURIComponent(name)}">
                    <i class="ri-quill-pen-line"></i>Sinh chi tiết
                  </button>
                  <label class="bond-share-toggle" title="Khi bật, nếu đồng đội này thấp cấp hơn nhân vật chính, họ sẽ đồng bộ nhận kinh nghiệm của nhân vật chính (cần ở gần).">
                    <input type="checkbox" class="bond-share-checkbox" data-detail-bond-share-exp="${encodeURIComponent(name)}" ${shareExp ? 'checked' : ''}>
                    <span class="bond-share-switch"></span>
                    <span class="bond-share-text">Đồng bộ EXP</span>
                  </label>
                  <label class="bond-share-toggle" title="Khi tắt, AI chỉ nhìn thấy tên đồng đội này và bị cấm cập nhật biến nhân vật đó để tiết kiệm token.">
                    <input type="checkbox" class="bond-share-checkbox bond-detail-visible-checkbox" data-detail-bond-visible="${encodeURIComponent(name)}" ${detailVisible ? 'checked' : ''}>
                    <span class="bond-share-switch"></span>
                    <span class="bond-share-text">Hiển thị hồ sơ</span>
                  </label>
                </div>
                
                <div class="bd-favor-bar-container">
                  <div class="bd-favor-label" style="color: #e74c3c;">
                    <span>Thiện cảm</span>
                    <span>${favor > 0 ? '+' : ''}${favor}</span>
                  </div>
                  <div class="bd-favor-track">
                    <div class="bd-favor-fill" style="width: ${favorPct}%"></div>
                  </div>
                </div>
              </div>
            </div>

            <div class="bd-scroll-content">
              <div class="bd-bento-grid">
                
                <div class="bd-thought-quote">
                   ${thought}
                </div>

                ${resourceCardHTML}
                
                <div class="bd-card">
                  <div class="bd-card-title"><i class="ri-bar-chart-box-line"></i> Thuộc tính</div>
                  <div class="bd-attr-grid">
                    ${(() => {
            const abbr = { '\u529b\u91cf': 'STR', '\u654f\u6377': 'DEX', '\u4f53\u8d28': 'CON', '\u667a\u529b': 'INT', '\u611f\u77e5': 'WIS', '\u9b45\u529b': 'CHA' };
            return Object.entries(stats).map(([k, v]) => `
                        <div class="bd-attr-card">
                          <div class="bd-attr-name">${displayRuntimeLabel(k)}</div>
                          <div class="bd-attr-val">${v}</div>
                          <div class="bd-attr-sub">${abbr[k] || ''}</div>
                        </div>
                      `).join('');
          })()}
                  </div>
                </div>

                <div class="bd-card">
                   <div class="bd-card-title"><i class="ri-shirt-line"></i> Ngoại hình</div>
                   <div class="bd-info-row">
                      <div class="bd-info-item"><span>Ngoại hình</span><span>${data.\u5916\u8C8C || 'Chưa ghi'}</span></div>
                      <div class="bd-info-item"><span>Trang phục</span><span>${data.\u7740\u88C5 || 'Chưa ghi'}</span></div>
                   </div>
                </div>
                
                <div class="bd-card">
                   <div class="bd-card-title"><i class="ri-sword-line"></i> Cấu hình chiến đấu</div>
                   ${Object.entries(equips).length === 0 && Object.entries(skills).length === 0 && Object.entries(comboSkills).length === 0 ?
            '<div style="text-align:center;padding:10px;color:rgba(0,0,0,0.3)">Chưa có thông tin cấu hình</div>' :
            `${(() => {
              const equipped = Object.entries(equips).filter(([k, v]) => v.\u88C5\u5907\u7BB1 !== true);
              const inBox = Object.entries(equips).filter(([k, v]) => v.\u88C5\u5907\u7BB1 === true);
              let html = '';
              if (equipped.length > 0) {
                html += `<div class="bd-combat-section">
                  <div class="bd-combat-label">Đã trang bị</div>
                  <div class="bd-combat-list">
                    ${equipped.map(([k, v]) => {
                  const qColor = getQualityColor(v.\u54C1\u8D28);
                  const nameHtml = normalizeQualityName(v.\u54C1\u8D28) === 'Thần thoại' ? `<span class="myth-gradient-text">${v.\u540D\u79F0 || k}</span>` : `<span style="color: ${qColor};">${v.\u540D\u79F0 || k}</span>`;
                  return `<div class="bd-combat-wrapper">
                        <div class="bd-combat-item" data-type="equip" data-bond-name="${name}" data-equip-key="${k}" data-info='${JSON.stringify(v).replace(/'/g, "&#39;")}' onclick="toggleCombatDetail(this)" style="border-left: 3px solid ${qColor};">
                          ${nameHtml}<span>${displayRuntimeLabel(v.\u90E8\u4F4D || '')}</span>
                        </div>
                      </div>`;
                }).join('')}
                  </div>
                </div>`;
              }
              if (inBox.length > 0) {
                html += `<div class="bd-combat-section">
                  <div class="bd-combat-label" style="color: #636e72;"><i class="ri-archive-line" style="margin-right:3px;"></i>Hòm trang bị</div>
                  <div class="bd-combat-list">
                    ${inBox.map(([k, v]) => {
                  const qColor = getQualityColor(v.\u54C1\u8D28);
                  const nameHtml = normalizeQualityName(v.\u54C1\u8D28) === 'Thần thoại' ? `<span class="myth-gradient-text">${v.\u540D\u79F0 || k}</span>` : `<span style="color: ${qColor};">${v.\u540D\u79F0 || k}</span>`;
                  return `<div class="bd-combat-wrapper">
                        <div class="bd-combat-item" data-type="equip" data-bond-name="${name}" data-equip-key="${k}" data-info='${JSON.stringify(v).replace(/'/g, "&#39;")}' onclick="toggleCombatDetail(this)" style="border-left: 3px solid ${qColor}; opacity: 0.7;">
                          ${nameHtml}<span>${displayRuntimeLabel(v.\u90E8\u4F4D || '')} 📦</span>
                        </div>
                      </div>`;
                }).join('')}
                  </div>
                </div>`;
              }
              if (equipped.length === 0 && inBox.length === 0 && Object.entries(equips).length > 0) {
                html += `<div class="bd-combat-section">
                  <div class="bd-combat-label">Trang bị</div>
                  <div class="bd-combat-list">
                    ${Object.entries(equips).map(([k, v]) => {
                  const qColor = getQualityColor(v.\u54C1\u8D28);
                  const nameHtml = normalizeQualityName(v.\u54C1\u8D28) === 'Thần thoại' ? `<span class="myth-gradient-text">${v.\u540D\u79F0 || k}</span>` : `<span style="color: ${qColor};">${v.\u540D\u79F0 || k}</span>`;
                  return `<div class="bd-combat-wrapper">
                        <div class="bd-combat-item" data-type="equip" data-bond-name="${name}" data-equip-key="${k}" data-info='${JSON.stringify(v).replace(/'/g, "&#39;")}' onclick="toggleCombatDetail(this)" style="border-left: 3px solid ${qColor};">
                          ${nameHtml}<span>${displayRuntimeLabel(v.\u90E8\u4F4D || '')}</span>
                        </div>
                      </div>`;
                }).join('')}
                  </div>
                </div>`;
              }
              return html;
            })()}
            ${Object.entries(skills).length > 0 ? `
              <div class="bd-combat-section">
                <div class="bd-combat-label">Kỹ năng</div>
                <div class="bd-combat-list">
                  ${Object.entries(skills).map(([k, v]) => {
              const qStyle = getQualityBadgeStyle(v.\u54C1\u8D28);
              const itemStyle = qStyle ? ` style="border-left: 3px solid ${qStyle.color};"` : '';
              const nameInner = normalizeQualityName(v.\u54C1\u8D28) === 'Thần thoại' ? `<span class="myth-gradient-text">${k}</span>` : k;
              return `
                    <div class="bd-combat-wrapper">
                      <div class="bd-combat-item" data-type="skill" data-info='${JSON.stringify({ \u540D\u79F0: k, ...v }).replace(/'/g, "&#39;")}' onclick="toggleCombatDetail(this)"${itemStyle}>
                        <span class="bd-combat-name-wrap">
                          <span class="bd-combat-name-text"${qStyle && normalizeQualityName(v.\u54C1\u8D28) !== 'Thần thoại' ? ` style="color:${qStyle.color};"` : ''}>${nameInner}</span>
                        </span>
                        <span>${displaySkillType(v.\u7C7B\u578B || '')}</span>
                      </div>
                    </div>`;
            }).join('')}
                </div>
              </div>` : ''}
            ${Object.entries(comboSkills).length > 0 ? `
              <div class="bd-combat-section">
                <div class="bd-combat-label" style="color: #f39c12;">Áo nghĩa liên kết</div>
                <div class="bd-combat-list">
                  ${Object.entries(comboSkills).map(([k, v]) => {
              const qStyle = getQualityBadgeStyle(v.\u54C1\u8D28);
              const itemStyle = qStyle ? ` style="border-left: 3px solid ${qStyle.color};"` : '';
              const nameInner = normalizeQualityName(v.\u54C1\u8D28) === 'Thần thoại' ? `<span class="myth-gradient-text">${k}</span>` : k;
              return `
                    <div class="bd-combat-wrapper" style="width: 100%;">
                      <div class="bd-combat-item bd-combo-skill" data-type="combo" data-info='${JSON.stringify({ \u540D\u79F0: k, ...v }).replace(/'/g, "&#39;")}' onclick="toggleCombatDetail(this)"${itemStyle}>
                        <span class="bd-combat-name-wrap">
                          <span class="bd-combat-name-text"${qStyle && normalizeQualityName(v.\u54C1\u8D28) !== 'Thần thoại' ? ` style="color:${qStyle.color};"` : ''}><i class="ri-links-line" style="color: #f39c12; margin-right: 4px;"></i>${nameInner}</span>
                        </span>
                        <span style="color: #e67e22;">${displaySkillType(v.\u7C7B\u578B || 'Liên kết')}</span>
                      </div>
                    </div>`;
            }).join('')}
                </div>
              </div>` : ''}`
          }
                </div>
                
              </div>
            </div>
          </div>
        `;
        pane.innerHTML = html;
        // \u5934\u50CF\u4E0A\u4F20：\u4F7F\u7528\u4E8B\u4EF6\u7ED1\u5B9A，\u907F\u514D\u5185\u8054 onclick \u5728\u67D0\u4E9B\u73AF\u5883\u4E0B\u5931\u6548
        const uploadMask = pane.querySelector('.bd-upload-mask[data-bond-name]');
        if (uploadMask) {
          uploadMask.addEventListener('click', (e) => {
            e.stopPropagation();
            const encodedName = uploadMask.getAttribute('data-bond-name') || '';
            const bondName = decodeURIComponent(encodedName || '');
            if (bondName && typeof window.triggerAvatarUpload === 'function') {
              window.triggerAvatarUpload(bondName);
            }
          });
        }
        const generateBtn = pane.querySelector('[data-generate-character-profile="bond"]');
        if (generateBtn) {
          generateBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            openCharacterProfileGenerator(name, 'bond', clonePromptData(data));
          });
        }
        const shareExpToggle = pane.querySelector('.bond-share-checkbox[data-detail-bond-share-exp]');
        if (shareExpToggle) {
          shareExpToggle.addEventListener('change', function (e) {
            e.stopPropagation();
            const encodedName = this.dataset.detailBondShareExp || '';
            const bondName = decodeURIComponent(encodedName || '');
            if (!bondName) return;
            const nextValue = this.checked;
            const success = applyMvuPatches([
              { op: 'add', path: `/\u7f81\u7eca\u5217\u8868/${bondName}/\u5206\u4eab\u7ecf\u9a8c`, value: nextValue }
            ]);
            if (!success) {
              this.checked = !nextValue;
              return;
            }
            _cachedData = null;
            setTimeout(refresh, 80);
          });
        }
        const detailVisibleToggle = pane.querySelector('.bond-detail-visible-checkbox[data-detail-bond-visible]');
        if (detailVisibleToggle) {
          detailVisibleToggle.addEventListener('change', function (e) {
            e.stopPropagation();
            const encodedName = this.dataset.detailBondVisible || '';
            const bondName = decodeURIComponent(encodedName || '');
            if (!bondName) return;

            const shouldShowDetail = this.checked;
            const latestData = fetchLatestMvuData();
            const currentConfig = _.cloneDeep(latestData?.\u7CFB\u7EDF\u914D\u7F6E?.\u7B80\u8BE6\u663E\u793A || {});
            const bondBriefPath = buildBondBriefDisplayPath(bondName);
            let nextPaths = getBriefDisplayPathList(latestData).filter(path => path !== bondBriefPath);
            if (!shouldShowDetail) nextPaths.push(bondBriefPath);

            const success = applyMvuPatches([{
              op: 'add',
              path: '/\u7cfb\u7edf\u914d\u7f6e/\u7b80\u8be6\u663e\u793a',
              value: {
                ...currentConfig,
                \u7B80\u8981\u663E\u793A\u8DEF\u5F84: Array.from(new Set(nextPaths))
              }
            }]);
            if (!success) {
              this.checked = !shouldShowDetail;
              return;
            }

            showStatusNotice(shouldShowDetail ? 'success' : 'info', shouldShowDetail ? `Đã khôi phục hiển thị hồ sơ「${bondName}」` : `Đã ẩn và khóa hồ sơ「${bondName}」`);
            _cachedData = null;
            setTimeout(refresh, 80);
          });
        }
      };

      window.closeBondDetail = () => {
        const container = document.getElementById('bond-container');
        if (container) {
          container.classList.remove('mode-detail');
          container.classList.remove('has-selection');
          container.style.minHeight = '';
        }
        const pane = document.getElementById('bond-detail-container');
        if (pane) pane.innerHTML = '';
        document.querySelectorAll('.bond-item').forEach(c => c.classList.remove('active'));
      };

      // \u88C5\u5907/\u6280\u80FD\u8BE6\u60C5\u5C55\u5F00
      window.toggleCombatDetail = (el) => {
        const wrapper = el.parentElement;
        const list = wrapper.parentElement;
        const existingDetail = wrapper.querySelector('.bd-combat-detail');
        const wasExpanded = el.classList.contains('expanded');

        // \u54C1\u8D28\u989C\u8272\u6620\u5C04
        const qualityColorMap = {
          'Thường': '#2D3436',
          'Tinh xảo': '#0047AB',
          'Hiếm': '#9b59b6',
          'Xuất sắc': '#e84393',
          'Truyền thuyết': '#e67e22',
          'Sử thi': '#C9A227',

        const data = fetchLatestMvuData();

        if (!oldName || !assets?.[oldName]) return;
        showInputDialog(`Đổi tên tài sản「${oldName}」`, {
          title: 'Đổi tên tài sản',
          placeholder: 'Nhập tên tài sản mới',
          defaultValue: oldName,
          okText: 'Xác nhận đổi tên',
          cancelText: 'Hủy',
          maxLength: 48
        }).then(({ confirmed, value }) => {
          if (!confirmed) return;

          const newName = String(value || '').trim();
          if (!newName) return showBattleWarning('Tên không được để trống');
          if (newName === oldName) return;
          if (/[\\/]/.test(newName)) return showBattleWarning('Tên không được chứa / hoặc \\\\');
          if (assets[newName]) return showBattleWarning('Đã tồn tại tài sản trùng tên');

          const targetAsset = assets[oldName];
          const success = applyMvuPatches([
            { op: 'add', path: `/\u6838\u5fc3\u8d44\u4ea7/${newName}`, value: targetAsset },
            { op: 'remove', path: `/\u6838\u5fc3\u8d44\u4ea7/${oldName}` }
          ]);

          if (success) {
            if (_activeBusinessAsset === oldName) _activeBusinessAsset = newName;

              _activeBusinessSubTabs[newName] = _activeBusinessSubTabs[oldName];

          if (!Array.isArray(config?.aliases)) continue;

          const url = new URL(rawUrl, window.location.href);
          url.searchParams.set('mode', 'browse');
          url.searchParams.set('embed', '1');
          return url.toString();
        } catch (error) {
          console.warn('[status-bar] Dựng địa chỉ bản đồ Kiếm Hổ Phách thất bại:', error);
          const hashIndex = rawUrl.indexOf('#');
          const beforeHash = hashIndex >= 0 ? rawUrl.slice(0, hashIndex) : rawUrl;
          const hashPart = hashIndex >= 0 ? rawUrl.slice(hashIndex) : '';
          const joiner = beforeHash.includes('?') ? '&' : '?';
          return `${beforeHash}${joiner}mode=browse&embed=1${hashPart}`;
        }
      };

      const injectBaseHrefIntoHtml = (html, pageUrl, bootstrapConfig = null) => {
        const text = String(html || '');
        if (!text.trim()) return '';
        try {
          const baseHref = new URL('./', pageUrl).href;
          const bootstrapMarkup = (bootstrapConfig && typeof bootstrapConfig === 'object')
            ? `${'<scr' + 'ipt>'}window.__AMBER_MAP_EMBED_CONFIG__=${JSON.stringify(bootstrapConfig).replace(/</g, '\\u003c')};${'</scr' + 'ipt>'}`
            : '';
          const injectParts = [`<base href="${baseHref}">`];
          if (bootstrapConfig && typeof bootstrapConfig === 'object') {
            injectParts.push(bootstrapMarkup);
          }
          const injectMarkup = injectParts.join('');
          if (/<base\b/i.test(text)) {
            if (!bootstrapMarkup) return text;
            if (/<head[^>]*>/i.test(text)) {
              return text.replace(/<head([^>]*)>/i, `<head$1>${bootstrapMarkup}`);
            }
            if (/<!doctype[^>]*>/i.test(text)) {
              return text.replace(/<!doctype[^>]*>/i, match => `${match}\n<head>${bootstrapMarkup}</head>`);
            }
            return `<head>${bootstrapMarkup}</head>${text}`;
          }
          if (/<head[^>]*>/i.test(text)) {
            return text.replace(/<head([^>]*)>/i, `<head$1>${injectMarkup}`);
          }
          if (/<!doctype[^>]*>/i.test(text)) {
            return text.replace(/<!doctype[^>]*>/i, match => `${match}\n<head>${injectMarkup}</head>`);
          }
          return `<head>${injectMarkup}</head>${text}`;

          console.warn('[status-bar] Chèn base cho bản đồ Kiếm Hổ Phách thất bại:', error);

          if (frame.srcdoc !== _amberMapEmbedSrcdoc) frame.srcdoc = _amberMapEmbedSrcdoc;
          return;

        if (frame.srcdoc) frame.srcdoc = '';
        const directSrc = String(_amberMapDirectUrl || frame.dataset.mapSrc || '').trim() || 'about:blank';

          if (!response.ok) throw new Error(`HTTP ${response.status}`);

          const contentType = String(response.headers.get('content-type') || '').toLowerCase();

            _amberMapHydratingUrl = '';

            return;

        const comboGroupTriggerMobileHTML = skillSystemMode === 'combo'

        const skillRowsHTML = skillSystemMode === 'combo'

        // \u53EC\u5524\u7269\u680F\u6E32\u67D3（\u6280\u80FD\u69FD\u4E0B\u65B9，\u6709\u624D\u663E\u793A，\u904D\u5386\u6240\u6709\u53EC\u5524\u7269）

        // \u8D44\u6E90\u6280\u80FD\u6E32\u67D3
        const \u8D44\u6E90\u6280\u80FD = \u4EBA\u7269.\u8D44\u6E90\u6280\u80FD || {};
        const resSkillEntries = Object.entries(\u8D44\u6E90\u6280\u80FD);
        const resQualityColorMap = {
          'Thường': { bg: 'rgba(45, 52, 54, 0.08)', color: '#636e72', border: 'rgba(45, 52, 54, 0.12)' },
          'Tinh xảo': { bg: 'rgba(0, 71, 171, 0.08)', color: '#0047AB', border: 'rgba(0, 71, 171, 0.15)' },
          'Hiếm': { bg: 'rgba(155, 89, 182, 0.08)', color: '#9b59b6', border: 'rgba(155, 89, 182, 0.15)' },
          'Xuất sắc': { bg: 'rgba(232, 67, 147, 0.08)', color: '#e84393', border: 'rgba(232, 67, 147, 0.15)' },

          'Thần thoại': { bg: 'rgba(232, 25, 139, 0.08)', color: '#e8198b', border: 'rgba(232, 25, 139, 0.15)' }
        };
        let resourceSkillsHTML = '';
        if (resSkillEntries.length > 0) {
          resourceSkillsHTML = '<div class="res-skill-list">';
          resSkillEntries.forEach(([skillName, skill]) => {
            const quality = normalizeQualityName(skill.\u54C1\u8D28 || 'Thường');
            const qStyle = resQualityColorMap[quality] || resQualityColorMap['Thường'];
            const type = displayRuntimeLabel(skill.\u7C7B\u578B || '');
            const cost = normalizeSkillCost(skill.\u6D88\u8017);
            const left = skill.\u5269\u4F59\u6B21\u6570 || 0;
            const max = skill.\u6B21\u6570\u4E0A\u9650 || 0;

            const tags = skill.\u6807\u7B7E || [];
            const effects = skill.\u6548\u679C || {};
            const desc = skill.\u63CF\u8FF0 || '';
            const ratio = max > 0 ? left / max : 0;

            // \u51B3\u5B9A\u663E\u793A\u65B9\u5F0F：\u5C0F\u69FD（<=5\u6B21）\u6216\u6570\u5B57（>5\u6B21）

            resourceSkillsHTML += `<div class="res-skill-card${left <= 0 ? ' exhausted' : ''}" data-res-skill="${escapeAttr(skillName)}">

              ${(cost || recover || tags.length > 0) ? `<div class="res-skill-meta">

              <div class="res-skill-detail">

          resourceSkillsHTML += '</div>';
        } else {
          resourceSkillsHTML = '<div class="res-skill-empty"><i class="ri-flask-line"></i>Chưa có kỹ năng tài nguyên</div>';

        // \u719F\u7EC3\u5EA6\u6E32\u67D3
        const profData = \u4EBA\u7269.\u719F\u7EC3\u5EA6 || {};
        const profCombat = Object.entries(profData.\u6218\u6597 || {});
        const profLife = Object.entries(profData.\u751F\u6D3B || {});
        const profTotal = profCombat.length + profLife.length;
        const PROF_TIER_BONUS = { '\u5b66\u5f92': 0, '\u719f\u624b': 1, '\u4e13\u5bb6': 2, '\u5927\u5e08': 4, '\u4f20\u5947': 6, 'Học việc': 0, 'Thành thạo': 1, 'Chuyên gia': 2, 'Đại sư': 4, 'Huyền thoại': 6 };
        const PROF_TIER_COLORS = { '\u5b66\u5f92': '#636e72', '\u719f\u624b': '#0984e3', '\u4e13\u5bb6': '#6c5ce7', '\u5927\u5e08': '#e17055', '\u4f20\u5947': '#d4af37', 'Học việc': '#636e72', 'Thành thạo': '#0984e3', 'Chuyên gia': '#6c5ce7', 'Đại sư': '#e17055', 'Huyền thoại': '#d4af37' };

        function renderProfBlock(entries, category, title, iconClass) {
          if (entries.length === 0) return '';
          return `<div class="prof-block"><div class="prof-block-title"><i class="${iconClass}"></i>${title}</div>` +
            entries.map(([name, e]) => {

              </div>`;

        let proficiencyHTML = '';

        } else {
          proficiencyHTML = '<div class="res-skill-empty"><i class="ri-bar-chart-line"></i>Chưa có độ thuần thục</div>';
        }

        const nearbyEntries = Object.entries(\u9644\u8FD1\u7684\u4EBA);
        const hasNearby = nearbyEntries.length > 0;
        const nearbyContent = (() => {
          if (!hasNearby) {
            return '<div class="tab-placeholder"><i class="ri-map-pin-2-line"></i>Chưa có thông tin người ở gần</div>';

          let cardsHTML = '';
          nearbyEntries.forEach(([name, p]) => {

            cardsHTML += `<div class="nearby-card" data-nearby-name="${name.replace(/"/g, '&quot;')}">

        })();

        const normalizeTextList = (items) => Array.from(new Set(
          (Array.isArray(items) ? items : [])
            .map(item => String(item || '').trim())
            .filter(Boolean)
        ));
        function normalizeSkillCost(value) {
          const text = String(value ?? '').trim();
          if (!text || text === 'undefined' || text === 'null' || text === '\u65e0') return 'Không';
          return displayRuntimeLabel(text);
        }
        const renderMythicChipList = (items, extraClass = '') => {
          const normalized = normalizeTextList(items);
          if (normalized.length === 0) return '';
          return `<div class="mythic-chip-list">${normalized.map(item => `<span class="mythic-chip${extraClass ? ` ${extraClass}` : ''}">${escapeHtml(displayRuntimeLabel(item))}</span>`).join('')}</div>`;

        const renderMythicFoldSection = ({ title, icon, count, detailHTML }) => {
          return `<div class="bd-card mythic-fold-card" data-mythic-section="${escapeAttr(title)}" role="button" tabindex="0" aria-expanded="false">

        const renderMythicLayerSection = (title, icon, layerData) => {
          const entries = Object.entries(layerData || {});
          const detailHTML = entries.length > 0
            ? `<div class="mythic-layer-list">${entries.map(([itemName, itemData]) => {

              return `<div class="mythic-layer-card">

            : `<div class="mythic-empty">Chưa có ${title}</div>`;
          return renderMythicFoldSection({
            title,
            icon,
            count: entries.length,
            detailHTML
          });
        };
        const \u9053\u9014\u540D\u79F0 = typeof \u9053\u9014.\u9053\u9014\u540D\u79F0 === 'string' ? \u9053\u9014.\u9053\u9014\u540D\u79F0.trim() : '';
        const \u9053\u9014\u9636\u6BB5 = Number.isFinite(Number(\u9053\u9014.\u9636\u6BB5)) ? Math.max(0, Number(\u9053\u9014.\u9636\u6BB5)) : 0;
        const \u9053\u9014\u9636\u6BB5\u79F0\u8C13\u6620\u5C04 = {
          1: 'Chạm lửa',
          2: 'Gõ cửa',
          3: 'Thấy điềm',
          4: 'Định tướng',
          5: 'Lột xác',
          6: 'Có danh',
          7: 'Vượt bậc',
          8: 'Đại công',
          9: 'Tràn đầy',
          10: 'Đăng thăng'
        };
        const \u9053\u9014\u9636\u6BB5\u79F0\u8C13 = \u9053\u9014\u9636\u6BB5\u79F0\u8C13\u6620\u5C04[\u9053\u9014\u9636\u6BB5] || (\u9053\u9014\u9636\u6BB5 > 0 ? `Giai đoạn ${\u9053\u9014\u9636\u6BB5}` : 'Chưa định bậc');
        const \u9053\u9014\u9636\u4F4D\u6620\u5C04 = {
          1: 'Bậc một',
          2: 'Bậc hai',
          3: 'Bậc ba',
          4: 'Bậc bốn',
          5: 'Bậc năm',
          6: 'Bậc sáu',
          7: 'Bậc bảy',
          8: 'Bậc tám',
          9: 'Bậc chín',
          10: 'Bậc mười'
        };
        const \u9053\u9014\u9636\u4F4D\u6587\u6848 = \u9053\u9014\u9636\u4F4D\u6620\u5C04[\u9053\u9014\u9636\u6BB5] || (\u9053\u9014\u9636\u6BB5 > 0 ? `Bậc ${\u9053\u9014\u9636\u6BB5}` : 'Chưa định bậc');
        const \u5F53\u524D\u6E90\u529B = Number.isFinite(Number(\u9053\u9014.\u5F53\u524D\u6E90\u529B)) ? Math.max(0, Number(\u9053\u9014.\u5F53\u524D\u6E90\u529B)) : 0;
        const \u6E90\u529B\u4E0A\u9650 = Number.isFinite(Number(\u9053\u9014.\u6E90\u529B\u4E0A\u9650)) ? Math.max(0, Number(\u9053\u9014.\u6E90\u529B\u4E0A\u9650)) : 0;
        const \u8981\u7D20\u5C42 = \u9053\u9014.\u8981\u7D20 || {};
        const \u5947\u8FF9\u5C42 = \u9053\u9014.\u5947\u8FF9 || {};
        const \u6743\u80FD\u5C42 = \u9053\u9014.\u6743\u80FD || {};
        const \u4E16\u754C\u5F71\u54CD = \u9053\u9014.\u4E16\u754C\u5F71\u54CD || {};
        const \u6982\u5FF5\u6807\u7B7E = normalizeTextList(\u4E16\u754C\u5F71\u54CD.\u6982\u5FF5\u6807\u7B7E);
        const \u9053\u9014\u80FD\u529B = normalizeTextList(\u9053\u9014.\u9053\u9014\u80FD\u529B);
        const \u7279\u6B8A\u6548\u679C = typeof \u4E16\u754C\u5F71\u54CD.\u7279\u6B8A\u6548\u679C === 'string' ? \u4E16\u754C\u5F71\u54CD.\u7279\u6B8A\u6548\u679C.trim() : '';
        const mythicUnlocked = Boolean(\u9053\u9014\u540D\u79F0)
          || \u9053\u9014\u9636\u6BB5 > 0
          || \u6E90\u529B\u4E0A\u9650 > 0
          || Object.keys(\u8981\u7D20\u5C42).length > 0
          || Object.keys(\u5947\u8FF9\u5C42).length > 0
          || Object.keys(\u6743\u80FD\u5C42).length > 0
          || \u6982\u5FF5\u6807\u7B7E.length > 0
          || \u9053\u9014\u80FD\u529B.length > 0

      // ==================== \u521D\u59CB\u5316 & \u4E8B\u4EF6 ====================
      const app = document.getElementById('app');
      const VALID_THEMES = new Set(['warm-white', 'dark', 'green', 'classic-dark']);
      const DARK_THEMES = new Set(['dark', 'classic-dark']);
      let _cachedData = null;
      let _syncedTheme = '';
      let _themePollTimer = null;
      let _parentThemeObserver = null;

      const readThemeFromNode = (node) => {
        if (!node || typeof node.getAttribute !== 'function') return '';
        return String(node.getAttribute('data-theme') || '').trim();
      };

      const resolveThemeFromContext = () => {
        try {
          if (window.parent && window.parent !== window) {
            const parentDoc = window.parent.document;
            const parentTheme = readThemeFromNode(parentDoc.body) || readThemeFromNode(parentDoc.documentElement);
            if (VALID_THEMES.has(parentTheme)) return parentTheme;
          }
        } catch (err) { }

        try {
          const storedTheme = String(localStorage.getItem('kivotos-theme') || localStorage.getItem('theme') || '').trim();
          if (VALID_THEMES.has(storedTheme)) return storedTheme;
        } catch (err) { }

        const ownTheme = readThemeFromNode(document.body) || readThemeFromNode(document.documentElement);
        if (VALID_THEMES.has(ownTheme)) return ownTheme;

        return 'warm-white';
      };

      const applySyncedTheme = (theme) => {
        const normalizedTheme = VALID_THEMES.has(theme) ? theme : 'warm-white';
        if (document.body) document.body.setAttribute('data-theme', normalizedTheme);
        document.documentElement.setAttribute('data-theme', normalizedTheme);
        document.documentElement.style.colorScheme = DARK_THEMES.has(normalizedTheme) ? 'dark' : 'light';
        _syncedTheme = normalizedTheme;
      };

      const syncThemeFromContext = () => {
        const nextTheme = resolveThemeFromContext();
        if (nextTheme !== _syncedTheme) applySyncedTheme(nextTheme);
      };

      const getStatusBarThemeAppearance = (theme = _syncedTheme) => {
        const normalizedTheme = VALID_THEMES.has(theme) ? theme : 'warm-white';
        if (normalizedTheme === 'dark') {
          return { theme: normalizedTheme, brightness: 0.7, saturation: 0.9 };
        }
        if (normalizedTheme === 'classic-dark') {
          return { theme: normalizedTheme, brightness: 0.76, saturation: 0.92 };
        }
        if (normalizedTheme === 'green') {
          return { theme: normalizedTheme, brightness: 0.98, saturation: 0.98 };
        }
        return { theme: normalizedTheme, brightness: 1, saturation: 1 };
      };

      const observeParentTheme = () => {
        if (_parentThemeObserver) {
          _parentThemeObserver.disconnect();
          _parentThemeObserver = null;
        }

        if (typeof MutationObserver !== 'function') return;

        try {
          if (!window.parent || window.parent === window) return;
          const parentDoc = window.parent.document;
          const target = parentDoc.body || parentDoc.documentElement;
          if (!target) return;
          _parentThemeObserver = new MutationObserver(() => syncThemeFromContext());
          _parentThemeObserver.observe(target, { attributes: true, attributeFilter: ['data-theme'] });
        } catch (err) { }
      };

      const initThemeSync = () => {
        syncThemeFromContext();
        observeParentTheme();

        window.addEventListener('storage', (event) => {
          if (!event || event.key === null || event.key === 'kivotos-theme' || event.key === 'theme') {
            syncThemeFromContext();
          }
        });

        window.addEventListener('message', (event) => {
          const data = event && event.data;
          if (data && data.type === 'kivotos-theme-change' && VALID_THEMES.has(data.theme)) {
            applySyncedTheme(data.theme);
          }
        });

        if (_themePollTimer == null) {
          _themePollTimer = window.setInterval(syncThemeFromContext, 1000);
        }
      };

      initThemeSync();

      const bindEvents = () => {
        // \u4E16\u754C\u4FE1\u606F\u70B9\u51FB\u663E\u793A\u5168\u6587（fixed\u5B9A\u4F4D，\u4E0D\u53D7overflow\u88C1\u5207）
        let _worldTip = null;
        const removeWorldTip = () => {
          if (_worldTip) { _worldTip.remove(); _worldTip = null; }
        };
        document.querySelectorAll('.world-info-row[data-full]').forEach(row => {
